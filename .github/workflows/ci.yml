name: CI

# Verify every pull request (and pushes that land on main) against the full
# quality bar. `mvn verify` runs the tests, the JaCoCo coverage floor and the
# Spotless / Checkstyle / PMD / SpotBugs gates, exactly as configured in pom.xml.
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  verify:
    name: Build & verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build, test and run quality gates
        run: mvn -B -ntp clean verify
